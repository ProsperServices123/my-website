<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Request a Quote - Gardening</title>
<style>
/* ===== RESET & BASE ===== */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
:root {
--navy: #1e3c72;
--navy-light: #2a5298;
--red: #e74c3c;
--red-dark: #c0392b;
--bg: #f4f7fb;
--card-bg: #ffffff;
--text: #1a1a2e;
--muted: #6b7a99;
--border: #e2e8f4;
--radius: 20px;
--radius-sm: 12px;
--max-w: 1200px;
--shadow: 0 10px 30px rgba(30,60,114,0.08);
}
html, body {
height: 100%;
margin: 0;
font-family: 'Poppins', system-ui, -apple-system, sans-serif;
background: var(--bg);
color: var(--text);
line-height: 1.6;
}

/* Blue Header */
.header {
background: #1e3c72;
color: white;
padding: 18px 20px;
display: flex;
align-items: center;
justify-content: space-between;
position: sticky;
top: 0;
z-index: 100;
}
.header-logo {
font-size: 28px;
font-weight: 700;
letter-spacing: -0.5px;
}

/* Main Content Wrapper */
.main-content {
min-height: calc(100vh - 120px); /* Accounts for header + footer */
max-width: var(--max-w);
margin: 0 auto;
padding: 40px 16px 60px;
}

/* Step Title */
.step-title {
font-size: 32px;
font-weight: 700;
color: var(--navy);
margin-bottom: 8px;
text-align: center;
}
.step-subtitle {
text-align: center;
color: var(--muted);
margin-bottom: 32px;
font-size: 16px;
}

/* Search Box */
.search-box {
width: 100%;
padding: 18px 24px;
border: 2px solid var(--border);
border-radius: var(--radius);
font-size: 17px;
background: var(--card-bg);
margin-bottom: 32px;
transition: all 0.3s;
}
.search-box:focus {
border-color: var(--navy-light);
box-shadow: var(--shadow);
outline: none;
}

/* Services Grid */
.services-grid {
display: grid;
grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
gap: 18px;
margin-bottom: 32px;
}
.service-item {
background: var(--card-bg);
border: 2px solid var(--border);
border-radius: var(--radius);
padding: 20px 24px;
display: flex;
align-items: center;
gap: 16px;
cursor: pointer;
transition: all 0.3s ease;
color: var(--text);
position: relative;
}
.service-item:hover {
transform: translateY(-6px);
box-shadow: var(--shadow);
border-color: var(--navy-light);
}
.service-item.selected {
border-color: var(--navy);
background: linear-gradient(145deg, #f0f4ff, #e6edff);
box-shadow: 0 12px 35px rgba(30,60,114,0.15);
}
.service-item.selected::after {
content: "✓";
position: absolute;
top: 16px;
right: 20px;
background: var(--navy);
color: white;
width: 28px;
height: 28px;
border-radius: 50%;
display: flex;
align-items: center;
justify-content: center;
font-weight: bold;
font-size: 16px;
}

/* Selected Services */
.selected-services {
background: var(--card-bg);
border: 2px solid var(--navy);
border-radius: var(--radius);
padding: 20px;
margin-bottom: 32px;
}

/* Form Fields */
.form-row {
display: flex;
gap: 20px;
margin-bottom: 20px;
}
.form-row > div { flex: 1; }
input, textarea {
width: 100%;
padding: 16px 20px;
border: 2px solid var(--border);
border-radius: var(--radius-sm);
font-size: 16px;
background: var(--card-bg);
color: var(--text);
transition: all 0.3s;
}
input:focus, textarea:focus {
border-color: var(--navy);
box-shadow: var(--shadow);
}

/* Buttons */
.btn {
padding: 18px 36px;
border: none;
border-radius: 50px;
font-weight: 600;
font-size: 17px;
cursor: pointer;
transition: all 0.3s;
width: 100%;
}
.btn-back {
background: #e2e8f4;
color: var(--text);
}
.btn-next, .btn-submit {
background: var(--red);
color: #fff;
}
.btn-next:hover, .btn-submit:hover {
background: var(--red-dark);
transform: translateY(-2px);
box-shadow: 0 8px 20px rgba(231,76,60,0.3);
}
.btn-back:hover {
background: #cbd5e1;
}

/* Error Message */
#error-message {
color: var(--red);
background: #fff0f0;
border: 2px solid var(--red);
border-radius: var(--radius-sm);
padding: 16px 20px;
margin: 20px 0;
text-align: center;
font-weight: 600;
display: none;
}

/* Blue Footer - Fixed at bottom */
.footer {
background: #1e3c72;
color: rgba(255,255,255,0.9);
text-align: center;
padding: 24px;
font-size: 14px;
position: fixed;
bottom: 0;
left: 0;
right: 0;
z-index: 99;
}
</style>
</head>
<body>

<!-- Blue Header -->
<div class="header">
  <div class="header-logo">
    📅 Book a Service
  </div>
  <button class="back-btn" style="background: rgba(255,255,255,0.15); color: white; border: none; padding: 10px 20px; border-radius: 50px; cursor: pointer;">← Back to Home</button>
</div>

<div class="main-content">
  <!-- Step 1: Select Services -->
  <div id="step1">
    <h2 class="step-title">Select Services</h2>
    <p class="step-subtitle">You can choose up to 3 services</p>
    

    <div class="services-grid" id="servicesGrid">
      <div class="service-item" onclick="toggleService(this)">Mowing Regular</div>
      <div class="service-item" onclick="toggleService(this)">Mowing Once</div>
      <div class="service-item" onclick="toggleService(this)">Tree Pruning</div>
      <div class="service-item" onclick="toggleService(this)">Weeding and Mulching</div>
      <div class="service-item" onclick="toggleService(this)">Leaf Cleanup</div>
      <div class="service-item" onclick="toggleService(this)">Gutter Cleaning</div>
      <div class="service-item" onclick="toggleService(this)">Car Detailing</div>
    </div>

    <div id="error-message">You can only select up to 3 services at a time.</div>

    <button class="btn btn-next" onclick="nextStep()">Continue →</button>
  </div>

  <!-- Step 2: Your details -->
  <div id="step2" style="display:none;">
    <h2 class="step-title">Your Details</h2>
    
    <div class="selected-services">
      <strong>Selected services:</strong><br>
      <span id="selectedList" style="color:var(--navy);">None selected</span>
    </div>

    <div class="form-row">
      <div><input type="text" placeholder="First name (required)"></div>
      <div><input type="text" placeholder="Last name (required)"></div>
    </div>
    <div class="form-row">
      <div><input type="email" placeholder="Email address (required)"></div>
      <div><input type="tel" placeholder="Phone number (required)"></div>
    </div>
    <input type="text" placeholder="Address (required)" style="margin-bottom:20px;">
    <textarea placeholder="Tell us a little more about the work (optional)" rows="4"></textarea>

    <div style="display:flex; gap:16px; margin-top:40px;">
      <button class="btn btn-back" onclick="prevStep()">← Back</button>
      <button class="btn btn-submit" onclick="submitForm()">Submit Request</button>
    </div>
  </div>
</div>

<!-- Blue Footer -->
<div class="footer">
  © 2026 Prosper's Services
</div>

<script>
/* Same JavaScript as before */
function toggleService(el) {
  const selectedCount = document.querySelectorAll('.service-item.selected').length;
  if (!el.classList.contains('selected') && selectedCount >= 3) {
    showError();
    return;
  }
  el.classList.toggle('selected');
  updateSelectedList();
  if (!el.classList.contains('selected')) hideError();
}

function showError() {
  const error = document.getElementById('error-message');
  error.style.display = 'block';
  setTimeout(hideError, 4500);
}

function hideError() {
  document.getElementById('error-message').style.display = 'none';
}

function updateSelectedList() {
  const selected = Array.from(document.querySelectorAll('.service-item.selected'))
                        .map(el => el.textContent);
  document.getElementById('selectedList').textContent = 
    selected.length ? selected.join(', ') : 'None selected';
}

function filterServices() {
  const term = document.getElementById('searchInput').value.toLowerCase();
  const items = document.querySelectorAll('.service-item');
  items.forEach(item => {
    item.style.display = item.textContent.toLowerCase().includes(term) ? '' : 'none';
  });
}

function nextStep() {
  document.getElementById('step1').style.display = 'none';
  document.getElementById('step2').style.display = 'block';
  updateSelectedList();
  hideError();
}

function prevStep() {
  document.getElementById('step1').style.display = 'block';
  document.getElementById('step2').style.display = 'none';
}

function submitForm() {
  alert("✅ Thank you! Your quote request has been submitted successfully.");
}
</script>
</body>
</html>
